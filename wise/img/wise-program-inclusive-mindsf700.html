<script>
$(document).ready(function() {
	$('select').select2({
		theme: 'bootstrap-5',
		width: '100%',
	});
	$('#stateSelect').on('change', function() {
		var stateId = $(this).val();
		if (stateId) {
			$.ajax({
				url: ' /wise/pcs/get_pc',
				type: 'POST',
				data: {
					"data[Pc][state_id]": stateId
				},
				success: function(response) {
					console.log(response);
					$('#pcSelect').html(' < option value = "" > Select Constituency < /option>' + response);
					$('#pcSelect').trigger('change');
				}
			});
		} else {
			$('#pcSelect').empty();
			$('#pcSelect').append($(' < option > < /option>').attr('value', '').text('Select Constituency'));
			$('#pcSelect').trigger('change');
		}
	});
	$("#CandidateAgeFilter, #CandidateWorkExperienceFilter, #CandidateNoticePeriodFilter").ionRangeSlider();
	$('.shortlist-candidate, .reject-candidate').on('click', function(e) {
		e.preventDefault();
		var url = $(this).attr('href');
		$('#remarkForm').attr('action', url);
		var modal = new bootstrap.Modal($('#remarkModal'));
		modal.show();
	});
});
</script>
